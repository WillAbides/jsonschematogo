$schema: https://json-schema.org/draft/2020-12/schema
type: object
x-go-type: MixedTypeArray
properties:
  string_array:
    type: array
    items:
      type: string
  number_array:
    type: array
    items:
      type: number
  boolean_array:
    type: array
    items:
      type: boolean
  object_array:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
        value:
          type: number
  mixed_array:
    type: array
    items:
      type: object
      properties:
        type:
          type: string
        data:
          type: string 